<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel="stylesheet" href="RegistrationContactForm.css">
</head>
<body>
<div>
    <h1>Registration</h1>
    <form id="registerForm">
        <div class="field-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
        </div>

        <div class="field-group">
            <label for="fNumber">Faculty Number</label>
            <input type="text" id="fNumber" name="fNumber" required>
        </div>

        <div class="field-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div class="field-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>

        <button type="submit">Send</button>
    </form>
    <p class="signin-link">Already have an account? <a href="LoginContactForm.html">Sign in</a></p>
</div>


</body>
</html>
