<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Auth | CampusDev</title>
  <link rel="icon" type="image/png" href="logo.jpg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">
  <link href="https://fonts.cdnfonts.com/css/monument-extended" rel="stylesheet">
  <link rel="stylesheet" href="RegistrationContactForm.css">
  <link rel="stylesheet" href="campusDev.css">
</head>
<body>

<div class="auth-box reveal">
  <div class="logo">CampusDev</div>

  <!-- LOGIN -->
  <form class="form active" id="loginForm">
    <h2 class="title">Log In</h2>
    <div class="input-box">
      <input type="email" id="login-email" name="email" required>
      <label for="login-email">Email</label>
    </div>
    <div class="input-box">
      <input type="password" id="login-password" name="password" required>
      <label for="login-password">Password</label>
    </div>
    <div class="small-link">
      <a href="#">Forgot password?</a>
    </div>
    <div class="btn-container">
      <button type="submit" class="btn-hero btn-hero-item">
        <span class="btn-hero-bg">
          <span class="btn-hero-bg-layers">
            <span class="btn-hero-bg-layer btn-hero-bg-layer-1 -purple"></span>
            <span class="btn-hero-bg-layer btn-hero-bg-layer-2 -turquoise"></span>
            <span class="btn-hero-bg-layer btn-hero-bg-layer-3 -yellow"></span>
          </span>
        </span>
        <span class="btn-hero-inner">
          <span class="btn-hero-inner-static">LOG IN</span>
          <span class="btn-hero-inner-hover">LOG IN</span>
        </span>
      </button>
    </div>
    <div class="switch-text">
      Don't have account? <span onclick="showRegister()">Sign Up</span>
    </div>
  </form>

  <!-- REGISTER -->
  <form class="form" id="registerForm">
    <h2 class="title">Sign Up</h2>
    <div class="input-box">
      <input type="text" id="reg-username" name="username" required>
      <label for="reg-username">Username</label>
    </div>
    
    <!-- Role Selection -->
    <div class="role-container">
      <label class="radio-label">
        <input type="radio" name="role" value="student" id="role-student" checked onchange="toggleRole(this)"> Student
      </label>
      <label class="radio-label">
        <input type="radio" name="role" value="professor" id="role-professor" onchange="toggleRole(this)"> Professor
      </label>
    </div>

    <div class="input-box" id="faculty-box">
      <input type="text" id="fNumber" name="fNumber" required>
      <label for="fNumber">Faculty Number</label>
    </div>
    <div class="input-box">
      <input type="email" id="reg-email" name="email" required>
      <label for="reg-email">Email</label>
    </div>
    <div class="input-box">
      <input type="password" id="reg-password" name="password" required>
      <label for="reg-password">Password</label>
    </div>
    <div class="btn-container">
      <button type="submit" class="btn-hero btn-hero-item">
        <span class="btn-hero-bg">
          <span class="btn-hero-bg-layers">
            <span class="btn-hero-bg-layer btn-hero-bg-layer-1 -purple"></span>
            <span class="btn-hero-bg-layer btn-hero-bg-layer-2 -turquoise"></span>
            <span class="btn-hero-bg-layer btn-hero-bg-layer-3 -yellow"></span>
          </span>
        </span>
        <span class="btn-hero-inner">
          <span class="btn-hero-inner-static">CREATE ACCOUNT</span>
          <span class="btn-hero-inner-hover">CREATE ACCOUNT</span>
        </span>
      </button>
    </div>
    <div class="switch-text">
      Already have account? <span onclick="showLogin()">Log In</span>
    </div>
  </form>
</div>

<script>
const loginForm = document.getElementById("loginForm");
const registerForm = document.getElementById("registerForm");

function showRegister(){
  loginForm.classList.remove("active");
  registerForm.classList.add("active");
}
function showLogin(){
  registerForm.classList.remove("active");
  loginForm.classList.add("active");
}
function toggleRole(radio) {
  const facultyBox = document.getElementById('faculty-box');
  const facultyInput = document.getElementById('fNumber');
  facultyBox.style.display = (radio.value === 'student') ? 'block' : 'none';
  facultyInput.required = (radio.value === 'student');
}

// Check if user wants to sign up directly
if(window.location.hash === '#signup') showRegister();

// Form redirection
document.querySelectorAll('form').forEach(form => {
  form.addEventListener('submit', e => {
    e.preventDefault();
    window.location.href = 'index.html';
  });
});

// Trigger reveal animation for the auth box
setTimeout(() => document.querySelector('.auth-box').classList.add('active'), 100);
</script>
</body>
</html>
