<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Meta -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="logo.jpg">
  <title>Kafeto</title>
  <link rel="stylesheet" href="campusDev.css">

  <!-- GSAP + Scroll -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/locomotive-scroll@4.1.4/dist/locomotive-scroll.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/locomotive-scroll@4.1.4/dist/locomotive-scroll.css">
</head>
<body>

  <!-- Loader -->
  <div id="preloader">
    <div class="loader-content">
      <div class="loader">
        <svg class="spin" viewBox="0 0 100 100"><circle class="dash" cx="50" cy="50" r="45"></circle></svg>
      </div>
      <div class="loader-text inline-block">CampusDev</div>
    </div>
  </div>

  <!-- Visuals -->
  <div class="bg"></div>

  <!-- Header -->
  <header class="header">
    <div class="nav__logo">
      <img src="logo.jpg" alt="CampusDev Logo">
    </div>

    <h1 data-i18n="header-title">CampusDev Beta</h1>

    <!-- Internationalization -->
    <div class="language-switch-container">
      <label class="switch-button" for="switch">
        <div class="switch-outer">
          <input id="switch" type="checkbox">
          <div class="button">
            <span class="button-toggle"></span>
            <span class="button-indicator"></span>
          </div>
        </div>
      </label>
      <span class="language-label">ENG/BG</span>
    </div>
  </header>

  <!-- Navigation -->
  <nav class="nav__menu">
    <ul>
      <li><a href="index.html" data-i18n="home-link">Home</a></li>
      <li><a href="forums.html" data-i18n="forums-link">Forums</a></li>
      <li><a href="kafeto.html" data-i18n="kafeto-link">Kafeto</a></li>
      <li><a href="RegistrationContactForm.html" data-i18n="login-link">Login/Sign Up</a></li>
    </ul>
  </nav>

  <!-- Logic -->
  <script src="script.js"></script>
</body>
</html>
